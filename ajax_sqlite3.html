<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
</head>
<body>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.1.1/jquery.min.js"></script>
    <form id="form_1" method="post" accept-charset="utf-8" return false>
        <p>名前 <input type="text" name = "userid" id ="userid"> </p>
        <p>パスワード <input type="text" name = "passward" id="passward"> </p>
        <p>年齢 <input type="text" name = "eage" id ="age"> </p>
        <p>性別 <input type="text" name = "gender" id="gender"> </p>
    </form>
    <button id="ajax">ajax</button>
    <div class="result"></div>
    <script type="text/javascript">
        $(function(){
            // Ajax button click
            $('#ajax').on('click',function(){
                $.ajax({
              //これはサーバーにより変更してください
                    url:'http://localhost:6543/',
                    type:'GET',
   dataType:"json",
                    data:{
                        'userid':$('#userid').val(),
                        'passward':$('#passward').val(),
                        'age':$('#age').val(),
                        'gender':$('#gender').val()
                    }
                })
                .done( (data) => {
                    $('.result').html(data);
                    console.log(data);
                })
                .fail( (data) => {
                    $('.result').html(data);
                    console.log(data);
                })
                .always( (data) => {
                    console.log(data);
                });
            });
        });
    </script>
</body>
</html>
